name: Build RUNA Multi-Target INAV

on:
  workflow_dispatch:
  push:

jobs:
  list-targets:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            g++ \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-dev \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3 \
            python3-pip

      - name: Clone INAV
        run: |
          git clone --branch 7.1.2 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Configure CMake
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Show available F405/WING targets
        run: |
          cd inav/build
          echo "===== AVAILABLE TARGETS ====="
          make help | grep -i -E "F405|WING|SPEEDY|MATEK|JHE|CADDX|CADD" || true

  build:
    runs-on: ubuntu-22.04
    needs: list-targets

    strategy:
      fail-fast: false
      matrix:
        target:
          - SPEEDYBEEF405WING
          - JHEMCUF405WING
          - MATEKF405
          - MATEKF405TE
          - MATEKF405SE

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            g++ \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-dev \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3 \
            python3-pip

      - name: Clone INAV
        run: |
          git clone --branch 7.1.2 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Configure CMake
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Check target exists
        run: |
          cd inav/build
          echo "Checking target: ${{ matrix.target }}"
          make help | grep -w "${{ matrix.target }}" || {
            echo "TARGET NOT FOUND: ${{ matrix.target }}"
            echo "Similar targets:"
            make help | grep -i -E "F405|WING|SPEEDY|MATEK|JHE|CADDX|CADD" || true
            exit 1
          }

      - name: Build target
        run: |
          cd inav/build
          make clean_${{ matrix.target }} || true
          make ${{ matrix.target }} -j2 VERBOSE=1

      - name: Find firmware
        if: always()
        run: |
          echo "===== BUILT FILES ====="
          find inav/build -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -print || true

      - name: Collect firmware
        if: success()
        run: |
          mkdir -p out/${{ matrix.target }}

          find inav/build -type f -name "${{ matrix.target }}*.hex" -exec cp {} out/${{ matrix.target }}/ \; || true
          find inav/build -type f -name "${{ matrix.target }}*.bin" -exec cp {} out/${{ matrix.target }}/ \; || true
          find inav/build -type f -name "${{ matrix.target }}*.elf" -exec cp {} out/${{ matrix.target }}/ \; || true

          echo "Collected files:"
          find out -type f -print || true

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RUNA-${{ matrix.target }}
          path: out/${{ matrix.target }}/*
