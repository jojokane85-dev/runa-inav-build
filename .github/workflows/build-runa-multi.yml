name: Build RUNA F405 WING v17 FIXED LSM6 0x70 GYRO SCALE

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout INAV 7.1.2
        run: |
          git clone --recursive --branch 7.1.2 https://github.com/iNavFlight/inav.git inav

      - name: Add RUNA target
        run: |
          cd inav

          echo "===== Create RUNA_F405_WING target v17 FIXED from MATEKF405SE ====="
          rm -rf src/main/target/RUNA_F405_WING
          mkdir -p src/main/target/RUNA_F405_WING

          cp -r src/main/target/MATEKF405SE/* src/main/target/RUNA_F405_WING/

          cat > src/main/target/RUNA_F405_WING/CMakeLists.txt <<'EOF'
          target_stm32f405xg(RUNA_F405_WING)
          EOF

          echo "===== Patch LSM6DXX driver: 0x70 + gyro scale divide ====="

          python3 <<'PY'
          from pathlib import Path

          p = Path("src/main/drivers/accgyro/accgyro_lsm6dxx.c")
          s = p.read_text()

          # Add 0x70 ID. This is likely LSM6DSV / LSM6DSV16X.
          extra_defs = (
              "\n"
              "#ifndef LSM6DSV_CHIP_ID\n"
              "#define LSM6DSV_CHIP_ID 0x70\n"
              "#endif\n"
          )

          if "LSM6DSV_CHIP_ID" not in s:
              marker = "#define LSM6DS3_CHIP_ID 0x69"
              if marker in s:
                  s = s.replace(marker, marker + extra_defs)

          # Accept 0x70 in detection switch.
          if "case LSM6DSV_CHIP_ID:" not in s:
              if "case LSM6DSL_CHIP_ID:" in s:
                  s = s.replace(
                      "case LSM6DSL_CHIP_ID:",
                      "case LSM6DSL_CHIP_ID:\n            case LSM6DSV_CHIP_ID:"
                  )
              elif "case LSM6DSO_CHIP_ID:" in s:
                  s = s.replace(
                      "case LSM6DSO_CHIP_ID:",
                      "case LSM6DSO_CHIP_ID:\n            case LSM6DSV_CHIP_ID:"
                  )

          # Add global saved chip id.
          if "static uint8_t runaLsm6dxxChipId" not in s:
              s = s.replace(
                  "#define LSM6DS3_CHIP_ID 0x69",
                  "#define LSM6DS3_CHIP_ID 0x69\n\nstatic uint8_t runaLsm6dxxChipId = 0;"
              )

          # Save WHO_AM_I chip id after reading it.
          if "runaLsm6dxxChipId = tmp;" not in s:
              s = s.replace(
                  "busRead(dev, LSM6DXX_REG_WHO_AM_I, &tmp);",
                  "busRead(dev, LSM6DXX_REG_WHO_AM_I, &tmp);\n        runaLsm6dxxChipId = tmp;"
              )

          # Patch gyro read function: if chip id 0x70, divide raw gyro by 32.
          # This is diagnostic. If too slow/fast, later change 32 to 16/8/4/64.
          if "RUNA_GYRO_SCALE_FIX_0x70" not in s:
              old = (
                  "gyro->gyroADCf[X] = gyro->gyroADCRaw[X];\n"
                  "    gyro->gyroADCf[Y] = gyro->gyroADCRaw[Y];\n"
                  "    gyro->gyroADCf[Z] = gyro->gyroADCRaw[Z];"
              )

              new = (
                  "// RUNA_GYRO_SCALE_FIX_0x70\n"
                  "    if (runaLsm6dxxChipId == LSM6DSV_CHIP_ID) {\n"
                  "        gyro->gyroADCRaw[X] /= 32;\n"
                  "        gyro->gyroADCRaw[Y] /= 32;\n"
                  "        gyro->gyroADCRaw[Z] /= 32;\n"
                  "    }\n\n"
                  "    gyro->gyroADCf[X] = gyro->gyroADCRaw[X];\n"
                  "    gyro->gyroADCf[Y] = gyro->gyroADCRaw[Y];\n"
                  "    gyro->gyroADCf[Z] = gyro->gyroADCRaw[Z];"
              )

              if old in s:
                  s = s.replace(old, new)
              else:
                  print("WARNING: exact gyro ADC assignment block not found.")

          p.write_text(s)
          PY

          echo "===== PATCHED LSM6DXX snippets ====="
          grep -nE "LSM6DSV_CHIP_ID|case LSM6D|runaLsm6dxxChipId|RUNA_GYRO_SCALE_FIX|gyroADCRaw|gyroADCf|WHO_AM_I" src/main/drivers/accgyro/accgyro_lsm6dxx.c || true

          echo "===== ORIGINAL MATEK target.h snippets ====="
          grep -nE "TARGET_BOARD_IDENTIFIER|USBD_PRODUCT_STRING|MPU|ICM|LSM|IMU|GYRO|ACC|BARO|MAG|MAX7456|SPI|I2C|UART|PINIO|BEEPER|SDCARD|ADC|DMA|MOTOR|SERVO" src/main/target/RUNA_F405_WING/target.h || true

          # Board name
          sed -i '/TARGET_BOARD_IDENTIFIER/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/USBD_PRODUCT_STRING/d' src/main/target/RUNA_F405_WING/target.h || true

          # Remove old Matek IMU
          sed -i '/MPU6000/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ICM42605/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ICM42688/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/USE_IMU_MPU/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/USE_IMU_ICM/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/IMU_MPU/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/IMU_ICM/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/MPU6000_CS_PIN/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/MPU6000_SPI_BUS/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ICM42605_CS_PIN/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ICM42605_SPI_BUS/d' src/main/target/RUNA_F405_WING/target.h || true

          # Remove wrong old gyro/acc/lsm target defines
          sed -i '/USE_GYRO/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/USE_ACC/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/GYRO_/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ACC_/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/USE_IMU_LSM/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/IMU_LSM/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/LSM6/d' src/main/target/RUNA_F405_WING/target.h || true

          # BARO/MAG only SPL06 + HMC5883 on I2C1
          sed -i '/USE_BARO_/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/USE_MAG_/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/USE_MAG_ALL/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/BARO_I2C_BUS/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/MAG_I2C_BUS/d' src/main/target/RUNA_F405_WING/target.h || true

          # Remove I2C2 extras
          sed -i '/USE_I2C_DEVICE_2/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/I2C2_SCL/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/I2C2_SDA/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/RANGEFINDER_I2C_BUS/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/PITOT_I2C_BUS/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/TEMPERATURE_I2C_BUS/d' src/main/target/RUNA_F405_WING/target.h || true

          # PINIO
          sed -i '/PINIO1_PIN/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/PINIO2_PIN/d' src/main/target/RUNA_F405_WING/target.h || true

          # ADC
          sed -i '/ADC_INSTANCE/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ADC1_DMA_STREAM/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ADC_CHANNEL_1_PIN/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ADC_CHANNEL_2_PIN/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/ADC_CHANNEL_3_PIN/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/VBAT_ADC_CHANNEL/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/CURRENT_METER_ADC_CHANNEL/d' src/main/target/RUNA_F405_WING/target.h || true
          sed -i '/RSSI_ADC_CHANNEL/d' src/main/target/RUNA_F405_WING/target.h || true

          cat >> src/main/target/RUNA_F405_WING/target.h <<'EOF'

          /*
           * RUNA_F405_WING v17 FIXED
           * Base: MATEKF405SE
           * IMU: LSM6DXX / 0x70 with gyro scale diagnostic fix.
           */

          #undef TARGET_BOARD_IDENTIFIER
          #define TARGET_BOARD_IDENTIFIER "RUNA"

          #undef USBD_PRODUCT_STRING
          #define USBD_PRODUCT_STRING "RUNA_F405_WING"

          /*
           * SPI1 — LSM6DXX IMU
           */
          #define USE_SPI
          #define USE_SPI_DEVICE_1

          #undef SPI1_NSS_PIN
          #define SPI1_NSS_PIN PA4

          #undef SPI1_SCK_PIN
          #define SPI1_SCK_PIN PA5

          #undef SPI1_MISO_PIN
          #define SPI1_MISO_PIN PA6

          #undef SPI1_MOSI_PIN
          #define SPI1_MOSI_PIN PA7

          #define USE_IMU_LSM6DXX
          #define IMU_LSM6DXX_ALIGN CW0_DEG
          #define LSM6DXX_CS_PIN SPI1_NSS_PIN
          #define LSM6DXX_SPI_BUS BUS_SPI1

          /*
           * I2C1 — SPL06 + HMC5883
           */
          #define USE_I2C
          #define USE_I2C_DEVICE_1

          #undef I2C1_SCL
          #define I2C1_SCL PB8

          #undef I2C1_SDA
          #define I2C1_SDA PB9

          #define USE_BARO
          #define BARO_I2C_BUS BUS_I2C1
          #define USE_BARO_SPL06

          #define USE_MAG
          #define MAG_I2C_BUS BUS_I2C1
          #define USE_MAG_HMC5883

          /*
           * SPI2 — OSD MAX7456
           */
          #define USE_SPI_DEVICE_2

          #undef SPI2_SCK_PIN
          #define SPI2_SCK_PIN PB13

          #undef SPI2_MISO_PIN
          #define SPI2_MISO_PIN PC2

          #undef SPI2_MOSI_PIN
          #define SPI2_MOSI_PIN PC3

          #define USE_MAX7456
          #define MAX7456_CS_PIN PB12
          #define MAX7456_SPI_BUS BUS_SPI2

          /*
           * SPI3 — SD card
           */
          #define USE_SPI_DEVICE_3

          #undef SPI3_SCK_PIN
          #define SPI3_SCK_PIN PB3

          #undef SPI3_MISO_PIN
          #define SPI3_MISO_PIN PB4

          #undef SPI3_MOSI_PIN
          #define SPI3_MOSI_PIN PB5

          #define USE_SDCARD
          #define USE_SDCARD_SPI
          #define SDCARD_SPI_BUS BUS_SPI3
          #define SDCARD_CS_PIN PC14

          /*
           * UARTs
           */
          #define USE_UART1
          #define UART1_TX_PIN PA9
          #define UART1_RX_PIN PA10

          #define USE_UART6
          #define UART6_TX_PIN PC6
          #define UART6_RX_PIN PC7

          /*
           * ADC
           */
          #define USE_ADC
          #define ADC_INSTANCE ADC1
          #define ADC1_DMA_STREAM DMA2_Stream0

          #undef ADC_CHANNEL_1_PIN
          #define ADC_CHANNEL_1_PIN PC0

          #undef ADC_CHANNEL_2_PIN
          #define ADC_CHANNEL_2_PIN PC1

          #undef VBAT_ADC_CHANNEL
          #define VBAT_ADC_CHANNEL ADC_CHN_1

          #undef CURRENT_METER_ADC_CHANNEL
          #define CURRENT_METER_ADC_CHANNEL ADC_CHN_2

          /*
           * Beeper / PINIO
           */
          #undef BEEPER
          #define BEEPER PC15
          #define BEEPER_INVERTED

          #define USE_PINIO
          #define USE_PINIOBOX

          #undef PINIO1_PIN
          #define PINIO1_PIN PC13

          EOF

          echo "===== Force target.c outputs with known CADDX/RUNA pins ====="
          cat > src/main/target/RUNA_F405_WING/target.c <<'EOF'
          /*
           * RUNA_F405_WING custom target.c
           *
           * Outputs from working CADDXF405_WING:
           * B07 MOTOR1
           * B06 MOTOR2
           * B00 SERVO3
           * B01 SERVO4
           * C08 SERVO5
           * C09 SERVO6
           */

          #include <stdbool.h>
          #include <platform.h>

          #include "drivers/io.h"
          #include "drivers/pwm_mapping.h"
          #include "drivers/timer.h"

          timerHardware_t timerHardware[] = {
              DEF_TIM(TIM4,  CH2, PB7,  TIM_USE_OUTPUT_AUTO, 1, 0), // MOTOR1 / S1
              DEF_TIM(TIM4,  CH1, PB6,  TIM_USE_OUTPUT_AUTO, 1, 0), // MOTOR2 / S2

              DEF_TIM(TIM3,  CH3, PB0,  TIM_USE_OUTPUT_AUTO, 1, 0), // SERVO3 / S3
              DEF_TIM(TIM3,  CH4, PB1,  TIM_USE_OUTPUT_AUTO, 1, 0), // SERVO4 / S4
              DEF_TIM(TIM8,  CH3, PC8,  TIM_USE_OUTPUT_AUTO, 1, 0), // SERVO5 / S5
              DEF_TIM(TIM8,  CH4, PC9,  TIM_USE_OUTPUT_AUTO, 1, 0), // SERVO6 / S6

              DEF_TIM(TIM2,  CH1, PA15, TIM_USE_LED,         0, 0), // LED strip if used
              DEF_TIM(TIM5,  CH3, PA2,  TIM_USE_ANY,         0, 0), // Softserial if used
          };

          const int timerHardwareCount = sizeof(timerHardware) / sizeof(timerHardware[0]);
          EOF

          echo "===== FINAL RUNA v17 FIXED target.h snippets ====="
          grep -nE "RUNA|TARGET_BOARD_IDENTIFIER|USBD_PRODUCT_STRING|LSM6|IMU|MPU|ICM|GYRO|ACC|BARO|SPL06|MAG|HMC5883|MAX7456|SPI1|SPI2|SPI3|I2C1|BUS_I2C1|UART1|UART6|PINIO|BEEPER|SDCARD|ADC|DMA" src/main/target/RUNA_F405_WING/target.h || true

          echo "===== FINAL PATCHED LSM6DXX snippets ====="
          grep -nE "LSM6DSV_CHIP_ID|case LSM6D|runaLsm6dxxChipId|RUNA_GYRO_SCALE_FIX|gyroADCRaw|gyroADCf|WHO_AM_I" src/main/drivers/accgyro/accgyro_lsm6dxx.c || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make cmake gcc-arm-none-eabi binutils-arm-none-eabi python3

      - name: Configure
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Build RUNA_F405_WING
        run: |
          cd inav/build
          make RUNA_F405_WING -j$(nproc)

      - name: Find firmware
        run: |
          echo "Built firmware files:"
          find inav/build -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -print

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: RUNA_F405_WING_v17_FIXED_LSM6_0x70_GYRO_SCALE_firmware
          path: |
            inav/build/**/*.hex
            inav/build/**/*.bin
            inav/build/**/*.elf
