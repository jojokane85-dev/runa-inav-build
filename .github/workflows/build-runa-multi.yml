name: Build RUNA FC45 CW0

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BASE_TARGET: SPEEDYBEEF405WING
      TARGET: CADDXF405_WING
      INAV_VERSION: 7.1.2

      # Тест ориентации IMU без FLIP
      IMU_ALIGN: CW0_DEG

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git build-essential g++ ruby cmake make \
            gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-dev ninja-build python3 python3-pip

      - name: Clone INAV 7.1.2
        run: |
          set -e
          echo "Cloning INAV ${INAV_VERSION}..."

          for i in 1 2 3 4 5; do
            echo "Clone attempt $i"
            git clone \
              --branch ${INAV_VERSION} \
              --depth 1 \
              --single-branch \
              --config http.version=HTTP/1.1 \
              --config http.postBuffer=524288000 \
              https://github.com/iNavFlight/inav.git && break

            echo "Clone failed, retrying..."
            rm -rf inav
            sleep 10
          done

          test -d inav || exit 1
          cd inav
          git rev-parse HEAD

      - name: Create CADDXF405_WING target
        run: |
          cd inav
          rm -rf src/main/target/${TARGET}
          cp -R src/main/target/${BASE_TARGET} src/main/target/${TARGET}

          if [ -f "src/main/target/${TARGET}/CMakeLists.txt" ]; then
            sed -i "s/${BASE_TARGET}/${TARGET}/g" src/main/target/${TARGET}/CMakeLists.txt
            cat src/main/target/${TARGET}/CMakeLists.txt
          fi

      - name: Patch target to CADDXF405_WING LSM6DXX CW0
        run: |
          cd inav

          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          target = os.environ["TARGET"]
          imu_align = os.environ.get("IMU_ALIGN", "CW0_DEG")

          path = Path(f"src/main/target/{target}/target.h")
          text = path.read_text(encoding="utf-8")

          remove_patterns = [
              r'#define\s+USE_IMU_ICM42605\s*',
              r'#define\s+IMU_ICM42605_ALIGN\s+\S+\s*',
              r'#define\s+ICM42605_CS_PIN\s+\S+\s*',
              r'#define\s+ICM42605_SPI_BUS\s+\S+\s*',

              r'#define\s+USE_IMU_ICM42688P\s*',
              r'#define\s+IMU_ICM42688P_ALIGN\s+\S+\s*',
              r'#define\s+ICM42688P_CS_PIN\s+\S+\s*',
              r'#define\s+ICM42688P_SPI_BUS\s+\S+\s*',

              r'#define\s+USE_IMU_LSM6DXX\s*',
              r'#define\s+LSM6DXX_SPI_BUS\s+\S+\s*',
              r'#define\s+LSM6DXX_CS_PIN\s+\S+\s*',
              r'#define\s+IMU_LSM6DXX_ALIGN\s+\S+\s*',

              r'#define\s+USE_MAG_QMC5883\s*',
              r'#define\s+USE_MAG_HMC5883\s*',
              r'#define\s+MAG_I2C_BUS\s+\S+\s*',

              r'#define\s+USE_BARO_SPL06\s*',
              r'#define\s+BARO_I2C_BUS\s+\S+\s*',
          ]

          for p in remove_patterns:
              text = re.sub(p, "", text, flags=re.M)

          text += f"""

          /*
           * RUNA CADDXF405_WING FC4.5
           *
           * Base target: SPEEDYBEEF405WING
           * IMU: LSM6DXX on SPI1
           * CS: PA4
           * SPI1: PA5 / PA6 / PA7
           * BARO: SPL06
           * MAG: QMC5883 / HMC5883
           *
           * Axis test:
           * IMU_LSM6DXX_ALIGN = {imu_align}
           */
          #define USE_IMU_LSM6DXX
          #define LSM6DXX_SPI_BUS BUS_SPI1
          #define LSM6DXX_CS_PIN PA4
          #define IMU_LSM6DXX_ALIGN {imu_align}

          #define USE_MAG_QMC5883
          #define USE_MAG_HMC5883
          #define MAG_I2C_BUS BUS_I2C1

          #define USE_BARO_SPL06
          #define BARO_I2C_BUS BUS_I2C1
          """

          path.write_text(text, encoding="utf-8")
          print("RUNA target.h patched")
          print("IMU align:", imu_align)
          PY

          grep -n -E "LSM6|QMC|HMC|SPL06|PA4|SPI1|CW" src/main/target/${TARGET}/target.h || true

      - name: Patch LSM6DXX safe detect
        run: |
          cd inav

          python3 <<'PY'
          from pathlib import Path

          path = Path("src/main/drivers/accgyro/accgyro_lsm6dxx.c")

          if not path.exists():
              print("ERROR: accgyro_lsm6dxx.c not found")
              raise SystemExit(1)

          text = path.read_text(encoding="utf-8")

          sig = "static bool lsm6dxxDetect"
          start = text.find(sig)

          if start == -1:
              raise SystemExit("lsm6dxxDetect not found")

          brace = text.find("{", start)
          depth = 0
          end = -1

          for i in range(brace, len(text)):
              if text[i] == "{":
                  depth += 1
              elif text[i] == "}":
                  depth -= 1
                  if depth == 0:
                      end = i + 1
                      break

          if end == -1:
              raise SystemExit("lsm6dxxDetect end not found")

          repl = """static bool lsm6dxxDetect(busDevice_t * dev)
          {
              uint8_t tmp = 0;

              busSetSpeed(dev, BUS_SPEED_INITIALIZATION);
              delay(150);

              busRead(dev, LSM6DXX_REG_WHO_AM_I, &tmp);

              /*
               * RUNA FC45 safe LSM6DXX detection.
               * Accepted IDs:
               * 0x69 / 0x6A / 0x6B / 0x6C / 0x6D
               */
              if (tmp == 0x69 || tmp == 0x6A || tmp == 0x6B || tmp == 0x6C || tmp == 0x6D) {
                  lsm6dID = tmp;
                  return true;
              }

              return false;
          }"""

          text = text[:start] + repl + text[end:]
          path.write_text(text, encoding="utf-8")
          print("RUNA LSM6DXX safe detect patched")
          PY

      - name: Patch RUNA name and startup text
        run: |
          cd inav

          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path("src/main/fc/fc_msp.c")

          if p.exists():
              text = p.read_text(encoding="utf-8")

              pat = r'sbufWriteU8\(dst,\s*strlen\(targetName\)\);\s*sbufWriteData\(dst,\s*targetName,\s*strlen\(targetName\)\);'
              rep = """const char *runaTargetName = "CADDXF405+RUNA";
                  sbufWriteU8(dst, strlen(runaTargetName));
                  sbufWriteData(dst, runaTargetName, strlen(runaTargetName));"""

              text, c = re.subn(pat, rep, text, count=1)
              p.write_text(text, encoding="utf-8")
              print("MSP name patch count:", c)
          else:
              print("WARNING: fc_msp.c not found")

          p = Path("src/main/io/osd.c")

          if p.exists():
              text = p.read_text(encoding="utf-8")

              old = 'tfp_sprintf(string_buffer, "INAV VERSION: %s", FC_VERSION_STRING);'
              new = 'tfp_sprintf(string_buffer, "version RUNA 1.0");'

              if old in text:
                  text = text.replace(old, new, 1)
                  text = text.replace(
                      'uint8_t xPos = (osdDisplayPort->cols - 19) / 2;',
                      'uint8_t xPos = OSD_CENTER_S(string_buffer);',
                      1
                  )
                  print("Startup text patched")
              else:
                  print("WARNING: startup text pattern not found")

              p.write_text(text, encoding="utf-8")
          else:
              print("WARNING: osd.c not found")
          PY

      - name: Patch RUNA OSD shutter
        run: |
          cd inav

          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("src/main/io/osd.c")

          if not path.exists():
              print("WARNING: osd.c not found, skip OSD shutter")
              raise SystemExit(0)

          text = path.read_text(encoding="utf-8")

          pattern = r'osdDrawNextElement\(\);\s*displayHeartbeat\(osdDisplayPort\);\s*displayCommitTransaction\(osdDisplayPort\);'

          replacement = r"""
                  static bool runaShutterWasActive = false;
                  static uint8_t runaShutterNextRow = 0;

                  if (currentLayout == 2) {
                      textAttributes_t runaAttr = TEXT_ATTRIBUTES_NONE;
                      TEXT_ATTRIBUTES_ADD_SOLID_BG(runaAttr);

                      char runaMask[64];

                      uint8_t cols = osdDisplayPort->cols;
                      uint8_t rows = osdDisplayPort->rows;

                      if (cols > 63) {
                          cols = 63;
                      }

                      const uint8_t windowWidth = cols >= 30 ? 10 : cols / 3;
                      const uint8_t windowHeight = rows >= 16 ? 4 : rows / 3;

                      const uint8_t windowX = (cols - windowWidth) / 2;
                      const uint8_t windowY = (rows - windowHeight) / 2;

                      if (!runaShutterWasActive) {
                          displayClearScreen(osdDisplayPort);
                          runaShutterWasActive = true;
                          runaShutterNextRow = 0;
                      }

                      for (uint8_t pass = 0; pass < 2; pass++) {
                          uint8_t y = runaShutterNextRow;

                          const bool inWindowY = (y >= windowY) && (y < windowY + windowHeight);

                          if (!inWindowY) {
                              memset(runaMask, ' ', cols);
                              runaMask[cols] = '\0';
                              displayWriteWithAttr(osdDisplayPort, 0, y, runaMask, runaAttr);
                          } else {
                              if (windowX > 0) {
                                  memset(runaMask, ' ', windowX);
                                  runaMask[windowX] = '\0';
                                  displayWriteWithAttr(osdDisplayPort, 0, y, runaMask, runaAttr);
                              }

                              const uint8_t rightX = windowX + windowWidth;

                              if (rightX < cols) {
                                  const uint8_t rightWidth = cols - rightX;
                                  memset(runaMask, ' ', rightWidth);
                                  runaMask[rightWidth] = '\0';
                                  displayWriteWithAttr(osdDisplayPort, rightX, y, runaMask, runaAttr);
                              }
                          }

                          runaShutterNextRow++;

                          if (runaShutterNextRow >= rows) {
                              runaShutterNextRow = 0;
                          }
                      }
                  } else {
                      if (runaShutterWasActive) {
                          displayClearScreen(osdDisplayPort);
                          runaShutterWasActive = false;
                          runaShutterNextRow = 0;
                      }

                      osdDrawNextElement();
                  }

                  displayHeartbeat(osdDisplayPort);
                  displayCommitTransaction(osdDisplayPort);"""

          new_text, count = re.subn(pattern, replacement, text, count=1)

          if count != 1:
              print("WARNING: OSD draw block not found, shutter skipped")
              raise SystemExit(0)

          path.write_text(new_text, encoding="utf-8")
          print("RUNA OSD shutter patched")
          PY

      - name: Patch VTX 3.3GHz table
        run: |
          cd inav

          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("src/main/io/vtx_string.c")

          if not path.exists():
              print("vtx_string.c not found, skip")
              raise SystemExit(0)

          text = path.read_text(encoding="utf-8")

          def sub(text, pattern, repl, name, flags=0):
              new, count = re.subn(pattern, repl, text, count=1, flags=flags)
              print(name, "patch count:", count)
              return new if count else text

          text = sub(
              text,
              r"#define\s+VTX_STRING_1G3_BAND_COUNT\s+\d+",
              "#define VTX_STRING_1G3_BAND_COUNT 6",
              "band count"
          )

          text = sub(
              text,
              r"#define\s+VTX_STRING_1G3_POWER_COUNT\s+\d+",
              "#define VTX_STRING_1G3_POWER_COUNT 5",
              "power count"
          )

          text = sub(
              text,
              r"const\s+uint16_t\s+vtx1G3frequencyTable\s*\[\s*VTX_STRING_1G3_BAND_COUNT\s*\]\s*\[\s*VTX_STRING_1G3_CHAN_COUNT\s*\]\s*=\s*\{.*?\};",
              """const uint16_t vtx1G3frequencyTable[VTX_STRING_1G3_BAND_COUNT][VTX_STRING_1G3_CHAN_COUNT] = {
              { 3083, 3114, 3145, 3176, 3207, 3238, 3269, 3300 },
              { 3215, 3235, 3255, 3275, 3295, 3315, 3335, 3355 },
              { 3170, 3190, 3210, 3230, 3250, 3270, 3290, 3310 },
              { 3320, 3345, 3370, 3395, 3420, 3445, 3470, 3495 },
              { 3310, 3330, 3355, 3380, 3405, 3430, 3455, 3480 },
              { 3330, 3350, 3370, 3390, 3410, 3430, 3450, 3470 },
          };""",
              "3.3 table",
              flags=re.S
          )

          path.write_text(text, encoding="utf-8")
          PY

      - name: Configure CMake
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Check target exists
        run: |
          cd inav/build

          echo "Checking target: ${TARGET}"

          if make help | grep -w "${TARGET}"; then
            echo "Target found: ${TARGET}"
          else
            echo "TARGET NOT FOUND: ${TARGET}"
            make help | grep -i -E "CADDX|SPEEDYBEE|F405|WING" || true
            exit 1
          fi

      - name: Build firmware
        run: |
          cd inav/build
          make clean_${TARGET} || true
          make ${TARGET} -j2 VERBOSE=1

      - name: Collect firmware and presets
        if: success()
        run: |
          mkdir -p out
          cd inav/build

          FOUND=0

          while IFS= read -r f; do
            base="$(basename "$f")"
            dst="../../out/RUNA_FC45_CW0_${base}"
            cp "$f" "$dst"
            echo "Copied: $dst"
            FOUND=$((FOUND + 1))
          done < <(find . -type f \( -name "*${TARGET}*.hex" -o -name "*${TARGET}*.bin" -o -name "*${TARGET}*.elf" \))

          if [ "$FOUND" -eq 0 ]; then
            echo "ERROR: no firmware files found"
            find . -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -print || true
            exit 1
          fi

          cat > ../../out/RUNA_FC45_PRESET_5G8_CW0.cli <<'EOF'
          batch start

          feature OSD
          feature VTX
          feature TELEMETRY
          feature CURRENT_METER
          feature BLACKBOX
          feature PWM_OUTPUT_ENABLE

          set acc_hardware = LSM6DXX
          set baro_hardware = SPL06
          set mag_hardware = NONE

          # Physical board arrow points to tail:
          set align_board_roll = 0
          set align_board_pitch = 0
          set align_board_yaw = 1800

          set gyro_zero_x = 0
          set gyro_zero_y = 0
          set gyro_zero_z = 0

          set acczero_x = 0
          set acczero_y = 0
          set acczero_z = 0
          set accgain_x = 4096
          set accgain_y = 4096
          set accgain_z = 4096

          set vbat_adc_channel = 1
          set rssi_adc_channel = 3
          set current_adc_channel = 2
          set airspeed_adc_channel = 4

          set receiver_type = SERIAL
          set serialrx_provider = CRSF

          set vtx_frequency_group = FREQUENCYGROUP_5G8
          set vtx_band = 1
          set vtx_channel = 1
          set vtx_power = 1
          set vtx_low_power_disarm = OFF
          set vtx_halfduplex = ON
          set vtx_smartaudio_early_akk_workaround = ON
          set vtx_smartaudio_alternate_softserial_method = ON
          set vtx_smartaudio_stopbits = 2

          # AUX4 / CH8
          # MID  = RUNA OSD-штора / Layout 2
          # HIGH = Layout 3
          aux 20 33 3 1300 1700
          aux 21 34 3 1700 2100

          set pinio_box1 = 47
          set pinio_box2 = 255
          set pinio_box3 = 57
          set pinio_box4 = 255

          save
          EOF

          cat > ../../out/RUNA_FC45_PRESET_3G3_CW0.cli <<'EOF'
          batch start

          feature OSD
          feature VTX
          feature TELEMETRY
          feature CURRENT_METER
          feature BLACKBOX
          feature PWM_OUTPUT_ENABLE

          set acc_hardware = LSM6DXX
          set baro_hardware = SPL06
          set mag_hardware = NONE

          # Physical board arrow points to tail:
          set align_board_roll = 0
          set align_board_pitch = 0
          set align_board_yaw = 1800

          set gyro_zero_x = 0
          set gyro_zero_y = 0
          set gyro_zero_z = 0

          set acczero_x = 0
          set acczero_y = 0
          set acczero_z = 0
          set accgain_x = 4096
          set accgain_y = 4096
          set accgain_z = 4096

          set vbat_adc_channel = 1
          set rssi_adc_channel = 3
          set current_adc_channel = 2
          set airspeed_adc_channel = 4

          set receiver_type = SERIAL
          set serialrx_provider = CRSF

          set vtx_frequency_group = FREQUENCYGROUP_1G3
          set vtx_band = 1
          set vtx_channel = 1
          set vtx_power = 5
          set vtx_low_power_disarm = OFF
          set vtx_halfduplex = ON
          set vtx_smartaudio_early_akk_workaround = ON
          set vtx_smartaudio_alternate_softserial_method = ON
          set vtx_smartaudio_stopbits = 2

          # AUX4 / CH8
          # MID  = RUNA OSD-штора / Layout 2
          # HIGH = Layout 3
          aux 20 33 3 1300 1700
          aux 21 34 3 1700 2100

          set pinio_box1 = 47
          set pinio_box2 = 255
          set pinio_box3 = 57
          set pinio_box4 = 255

          save
          EOF

          cat > ../../out/README_RUNA_FC45_CW0.txt <<'EOF'
          RUNA FC45 CW0_DEG BUILD

          Base:
          - INAV 7.1.2
          - BASE_TARGET: SPEEDYBEEF405WING
          - NEW TARGET: CADDXF405_WING

          IMU test:
          - IMU_LSM6DXX_ALIGN = CW0_DEG
          - NO FLIP

          Added:
          - CADDXF405+RUNA name
          - startup text: version RUNA 1.0
          - LSM6DXX / SPL06 / QMC5883 target patch
          - safe LSM6DXX detection
          - RUNA OSD shutter on Layout 2
          - VTX 3.3GHz table in FREQUENCYGROUP_1G3
          - 5.8GHz and 3.3GHz CLI presets

          IMPORTANT:
          Test without propeller.

          After flashing:
          1. Full Chip Erase.
          2. Open CLI:
             defaults
             save

          3. After reboot, do not touch the board for 15 seconds.

          4. If board arrow points to tail, paste:
             set mag_hardware = NONE
             set align_board_roll = 0
             set align_board_pitch = 0
             set align_board_yaw = 1800
             set gyro_zero_x = 0
             set gyro_zero_y = 0
             set gyro_zero_z = 0
             set acczero_x = 0
             set acczero_y = 0
             set acczero_z = 0
             set accgain_x = 4096
             set accgain_y = 4096
             set accgain_z = 4096
             save

          5. After reboot, do not touch the board for 15 seconds.
          6. Calibrate accelerometer.
          7. Check Setup.

          Desired Setup movement:
          - right wing down -> model right wing down
          - left wing down -> model left wing down
          - nose up -> model nose up
          - nose down -> model nose down
          - model must NOT slowly drift/turn by itself

          If movement is inverted/wrong:
          - do not fly
          - try CW180_DEG next

          If model still slowly drifts:
          - do not fly
          - try CW180_DEG next
          EOF

          ls -la ../../out

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RUNA-FC45-CW0
          path: out/*
