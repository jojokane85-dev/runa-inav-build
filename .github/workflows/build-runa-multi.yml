name: Build RUNA F405 WING

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout INAV 7.1.2
        run: |
          git clone --recursive --branch 7.1.2 https://github.com/iNavFlight/inav.git inav

      - name: Add RUNA target
        run: |
          cd inav
          mkdir -p src/main/target/RUNA_F405_WING

          cp -r src/main/target/MATEKF405SE/* src/main/target/RUNA_F405_WING/

          echo 'target_stm32f405xg(RUNA_F405_WING)' > src/main/target/RUNA_F405_WING/CMakeLists.txt

          echo "===== RUNA target files ====="
          ls -la src/main/target/RUNA_F405_WING

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make cmake gcc-arm-none-eabi binutils-arm-none-eabi python3

      - name: Configure
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Build RUNA_F405_WING
        run: |
          cd inav/build
          make RUNA_F405_WING -j$(nproc)

      - name: Find firmware
        run: |
          echo "Built firmware files:"
          find inav/build -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -print

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: RUNA_F405_WING_firmware
          path: |
            inav/build/**/*.hex
            inav/build/**/*.bin
            inav/build/**/*.elf
