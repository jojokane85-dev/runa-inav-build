name: Build RUNA Multi-Target INAV

on:
  workflow_dispatch:
  push:

jobs:
  list-targets:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            g++ \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-dev \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3 \
            python3-pip

      - name: Clone INAV
        run: |
          git clone --branch 7.1.2 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Configure CMake
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Show available F405/WING targets
        run: |
          cd inav/build
          echo "===== AVAILABLE TARGETS ====="
          make help | grep -i -E "F405|WING|SPEEDY|MATEK|JHE|CADDX|CADD" || true

  build:
    runs-on: ubuntu-22.04
    needs: list-targets

    strategy:
      fail-fast: false
      matrix:
        target:
          - SPEEDYBEEF405WING
          - JHEMCUF405WING
          - MATEKF405
          - MATEKF405TE
          - MATEKF405SE

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            g++ \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-dev \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3 \
            python3-pip

      - name: Clone INAV
        run: |
          git clone --branch 7.1.2 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Patch RUNA name in Configurator
        run: |
          cd inav
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("src/main/fc/fc_msp.c")
          text = path.read_text(encoding="utf-8")

          pattern = r'sbufWriteU8\(dst,\s*strlen\(targetName\)\);\s*sbufWriteData\(dst,\s*targetName,\s*strlen\(targetName\)\);'

          replacement = '''sbufWriteU8(dst, strlen(targetName) + 5);
                  sbufWriteData(dst, targetName, strlen(targetName));
                  sbufWriteData(dst, "+RUNA", 5);'''

          new_text, count = re.subn(pattern, replacement, text, count=1)

          if count != 1:
              print("ERROR: Could not patch MSP_BOARD_INFO targetName block")
              raise SystemExit(1)

          path.write_text(new_text, encoding="utf-8")
          print("Patched targetName -> targetName+RUNA in MSP_BOARD_INFO")
          PY

      - name: Patch RUNA 3.3GHz VTX table
        run: |
          cd inav
          python3 <<'PY'
          from pathlib import Path
          import re

          def must_replace(text, old, new, name):
              if old not in text:
                  print(f"ERROR: not found: {name}")
                  raise SystemExit(1)
              return text.replace(old, new, 1)

          # =========================
          # PATCH vtx_string.c
          # FREQUENCYGROUP_1G3 -> RUNA 3.3GHz table
          # =========================

          path = Path("src/main/io/vtx_string.c")
          text = path.read_text(encoding="utf-8")

          text = must_replace(
              text,
              "#define VTX_STRING_1G3_BAND_COUNT 2",
              "#define VTX_STRING_1G3_BAND_COUNT 6",
              "VTX_STRING_1G3_BAND_COUNT"
          )

          text = must_replace(
              text,
              "#define VTX_STRING_1G3_POWER_COUNT 3",
              "#define VTX_STRING_1G3_POWER_COUNT 5",
              "VTX_STRING_1G3_POWER_COUNT"
          )

          freq_pattern = r'const uint16_t vtx1G3frequencyTable\[VTX_STRING_1G3_BAND_COUNT\]\[VTX_STRING_1G3_CHAN_COUNT\] = \{.*?\};'
          freq_replacement = '''const uint16_t vtx1G3frequencyTable[VTX_STRING_1G3_BAND_COUNT][VTX_STRING_1G3_CHAN_COUNT] = {
              { 3083, 3114, 3145, 3176, 3207, 3238, 3269, 3300 }, // RUNA 3.3 BAND_A
              { 3215, 3235, 3255, 3275, 3295, 3315, 3335, 3355 }, // RUNA 3.3 BAND_B
              { 3170, 3190, 3210, 3230, 3250, 3270, 3290, 3310 }, // RUNA 3.3 BAND_C
              { 3320, 3345, 3370, 3395, 3420, 3445, 3470, 3495 }, // RUNA 3.3 BAND_D
              { 3310, 3330, 3355, 3380, 3405, 3430, 3455, 3480 }, // RUNA 3.3 BAND_E
              { 3330, 3350, 3370, 3390, 3410, 3430, 3450, 3470 }, // RUNA 3.3 BAND_F
          };'''

          text, count = re.subn(freq_pattern, freq_replacement, text, flags=re.S)
          if count != 1:
              print("ERROR: could not replace vtx1G3frequencyTable")
              raise SystemExit(1)

          band_names_pattern = r'const char \* const vtx1G3BandNames\[VTX_STRING_1G3_BAND_COUNT \+ 1\] = \{.*?\};'
          band_names_replacement = '''const char * const vtx1G3BandNames[VTX_STRING_1G3_BAND_COUNT + 1] = {
              "-", "A", "B", "C", "D", "E", "F",
          };'''

          text, count = re.subn(band_names_pattern, band_names_replacement, text, flags=re.S)
          if count != 1:
              print("ERROR: could not replace vtx1G3BandNames")
              raise SystemExit(1)

          text, count = re.subn(
              r'const char vtx1G3BandLetter\[VTX_STRING_1G3_BAND_COUNT \+ 1\] = ".*?";',
              'const char vtx1G3BandLetter[VTX_STRING_1G3_BAND_COUNT + 1] = "-ABCDEF";',
              text,
              flags=re.S
          )
          if count != 1:
              print("ERROR: could not replace vtx1G3BandLetter")
              raise SystemExit(1)

          power_names_pattern = r'const char \* const vtx1G3DefaultPowerNames\[VTX_STRING_1G3_POWER_COUNT \+ 1\] = \{.*?\};'
          power_names_replacement = '''const char * const vtx1G3DefaultPowerNames[VTX_STRING_1G3_POWER_COUNT + 1] = {
              "---", "25", "200", "400", "800", "MAX"
          };'''

          text, count = re.subn(power_names_pattern, power_names_replacement, text, flags=re.S)
          if count != 1:
              print("ERROR: could not replace vtx1G3DefaultPowerNames")
              raise SystemExit(1)

          path.write_text(text, encoding="utf-8")
          print("Patched vtx_string.c: FREQUENCYGROUP_1G3 is now RUNA 3.3GHz")

          # =========================
          # PATCH vtx_string.h
          # =========================

          path = Path("src/main/io/vtx_string.h")
          text = path.read_text(encoding="utf-8")

          text = must_replace(
              text,
              "extern const uint16_t vtx1G3frequencyTable[2][8];",
              "extern const uint16_t vtx1G3frequencyTable[6][8];",
              "vtx1G3frequencyTable extern"
          )

          # Fix header typo if present
          text = text.replace(
              "extern const char vtx51G3BandLetter[];",
              "extern const char vtx1G3BandLetter[];"
          )

          path.write_text(text, encoding="utf-8")
          print("Patched vtx_string.h")

          # =========================
          # PATCH vtx_tramp.h
          # Expand 1G3 limits to RUNA 3.3GHz range
          # =========================

          path = Path("src/main/io/vtx_tramp.h")
          text = path.read_text(encoding="utf-8")

          text = must_replace(
              text,
              "#define VTX_TRAMP_1G3_BAND_COUNT 2",
              "#define VTX_TRAMP_1G3_BAND_COUNT 6",
              "VTX_TRAMP_1G3_BAND_COUNT"
          )

          text = must_replace(
              text,
              "#define VTX_TRAMP_1G3_MAX_POWER_COUNT 3",
              "#define VTX_TRAMP_1G3_MAX_POWER_COUNT 5",
              "VTX_TRAMP_1G3_MAX_POWER_COUNT"
          )

          text = must_replace(
              text,
              "#define VTX_TRAMP_1G3_MIN_FREQUENCY_MHZ 1000",
              "#define VTX_TRAMP_1G3_MIN_FREQUENCY_MHZ 3000",
              "VTX_TRAMP_1G3_MIN_FREQUENCY_MHZ"
          )

          text = must_replace(
              text,
              "#define VTX_TRAMP_1G3_MAX_FREQUENCY_MHZ 1399",
              "#define VTX_TRAMP_1G3_MAX_FREQUENCY_MHZ 3599",
              "VTX_TRAMP_1G3_MAX_FREQUENCY_MHZ"
          )

          path.write_text(text, encoding="utf-8")
          print("Patched vtx_tramp.h: 1G3 limits -> 3.3GHz")

          # =========================
          # PATCH vtx_tramp.c
          # 3.3 power table
          # =========================

          path = Path("src/main/io/vtx_tramp.c")
          text = path.read_text(encoding="utf-8")

          text = must_replace(
              text,
              "const uint16_t trampPowerTable_1G3_800[VTX_TRAMP_1G3_MAX_POWER_COUNT] = { 25, 200, 800 };",
              "const uint16_t trampPowerTable_1G3_800[VTX_TRAMP_1G3_MAX_POWER_COUNT] = { 25, 200, 400, 800, 800 };",
              "trampPowerTable_1G3_800"
          )

          text = must_replace(
              text,
              'const char * const trampPowerNames_1G3_800[VTX_TRAMP_1G3_MAX_POWER_COUNT + 1] = { "---", "25 ", "200", "800" };',
              'const char * const trampPowerNames_1G3_800[VTX_TRAMP_1G3_MAX_POWER_COUNT + 1] = { "---", "25 ", "200", "400", "800", "800" };',
              "trampPowerNames_1G3_800"
          )

          text = must_replace(
              text,
              "const uint16_t trampPowerTable_1G3_2000[VTX_TRAMP_1G3_MAX_POWER_COUNT] = { 25, 200, 2000 };",
              "const uint16_t trampPowerTable_1G3_2000[VTX_TRAMP_1G3_MAX_POWER_COUNT] = { 25, 200, 400, 800, 2000 };",
              "trampPowerTable_1G3_2000"
          )

          text = must_replace(
              text,
              'const char * const trampPowerNames_1G3_2000[VTX_TRAMP_1G3_MAX_POWER_COUNT + 1] = { "---", "25 ", "200", "2000" };',
              'const char * const trampPowerNames_1G3_2000[VTX_TRAMP_1G3_MAX_POWER_COUNT + 1] = { "---", "25 ", "200", "400", "800", "2000" };',
              "trampPowerNames_1G3_2000"
          )

          path.write_text(text, encoding="utf-8")
          print("Patched vtx_tramp.c: RUNA 3.3GHz power table")
          PY

      - name: Patch RUNA OSD shutter
        run: |
          cd inav
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("src/main/io/osd.c")
          text = path.read_text(encoding="utf-8")

          pattern = r'osdDrawNextElement\(\);\s*displayHeartbeat\(osdDisplayPort\);\s*displayCommitTransaction\(osdDisplayPort\);'

          replacement = r'''
                  static bool runaShutterWasActive = false;
                  static uint8_t runaShutterNextRow = 0;

                  if (currentLayout == 2) {
                      textAttributes_t runaAttr = TEXT_ATTRIBUTES_NONE;
                      TEXT_ATTRIBUTES_ADD_SOLID_BG(runaAttr);

                      char runaMask[64];

                      uint8_t cols = osdDisplayPort->cols;
                      uint8_t rows = osdDisplayPort->rows;

                      if (cols > 63) {
                          cols = 63;
                      }

                      // RUNA shutter window.
                      // For MAX7456 30x16 this gives about 10x4 cells.
                      const uint8_t windowWidth = cols >= 30 ? 10 : cols / 3;
                      const uint8_t windowHeight = rows >= 16 ? 4 : rows / 3;

                      const uint8_t windowX = (cols - windowWidth) / 2;
                      const uint8_t windowY = (rows - windowHeight) / 2;

                      // Clear screen only once when entering shutter mode.
                      if (!runaShutterWasActive) {
                          displayClearScreen(osdDisplayPort);
                          runaShutterWasActive = true;
                          runaShutterNextRow = 0;
                      }

                      // Draw 2 rows per OSD cycle so MAX7456 can process it.
                      for (uint8_t pass = 0; pass < 2; pass++) {
                          uint8_t y = runaShutterNextRow;

                          const bool inWindowY = (y >= windowY) && (y < windowY + windowHeight);

                          if (!inWindowY) {
                              memset(runaMask, ' ', cols);
                              runaMask[cols] = '\0';
                              displayWriteWithAttr(osdDisplayPort, 0, y, runaMask, runaAttr);
                          } else {
                              // Left shutter area
                              if (windowX > 0) {
                                  memset(runaMask, ' ', windowX);
                                  runaMask[windowX] = '\0';
                                  displayWriteWithAttr(osdDisplayPort, 0, y, runaMask, runaAttr);
                              }

                              // Right shutter area
                              const uint8_t rightX = windowX + windowWidth;
                              if (rightX < cols) {
                                  const uint8_t rightWidth = cols - rightX;
                                  memset(runaMask, ' ', rightWidth);
                                  runaMask[rightWidth] = '\0';
                                  displayWriteWithAttr(osdDisplayPort, rightX, y, runaMask, runaAttr);
                              }
                          }

                          runaShutterNextRow++;

                          if (runaShutterNextRow >= rows) {
                              runaShutterNextRow = 0;
                          }
                      }
                  } else {
                      // Clear old shutter when leaving Layout 2.
                      if (runaShutterWasActive) {
                          displayClearScreen(osdDisplayPort);
                          runaShutterWasActive = false;
                          runaShutterNextRow = 0;
                      }

                      osdDrawNextElement();
                  }

                  displayHeartbeat(osdDisplayPort);
                  displayCommitTransaction(osdDisplayPort);'''

          new_text, count = re.subn(pattern, replacement, text, count=1)

          if count != 1:
              print("ERROR: OSD draw block not found")
              raise SystemExit(1)

          path.write_text(new_text, encoding="utf-8")
          print("Patched RUNA OSD shutter v2: Layout 2 = full shutter with center window")
          PY

      - name: Configure CMake
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Check target exists
        run: |
          cd inav/build
          echo "Checking target: ${{ matrix.target }}"
          make help | grep -w "${{ matrix.target }}" || {
            echo "TARGET NOT FOUND: ${{ matrix.target }}"
            echo "Similar targets:"
            make help | grep -i -E "F405|WING|SPEEDY|MATEK|JHE|CADDX|CADD" || true
            exit 1
          }

      - name: Build target
        run: |
          cd inav/build
          make clean_${{ matrix.target }} || true
          make ${{ matrix.target }} -j2 VERBOSE=1

      - name: Find firmware
        if: always()
        run: |
          echo "===== BUILT FILES ====="
          find inav/build -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -print || true

      - name: Collect and rename firmware
        if: success()
        run: |
          mkdir -p out/${{ matrix.target }}

          python3 <<'PY'
          from pathlib import Path
          import shutil

          target = "${{ matrix.target }}"
          build_dir = Path("inav/build")
          out_dir = Path("out") / target
          out_dir.mkdir(parents=True, exist_ok=True)

          exts = {".hex", ".bin", ".elf"}
          copied = 0

          for file in build_dir.rglob("*"):
              if not file.is_file():
                  continue
              if file.suffix.lower() not in exts:
                  continue
              if target not in file.name:
                  continue

              new_name = f"RUNA_3G3_SHUTTER_{file.name}"
              dst = out_dir / new_name
              shutil.copy2(file, dst)
              print(f"Copied: {file} -> {dst}")
              copied += 1

          if copied == 0:
              print("ERROR: no firmware files found for target", target)
              raise SystemExit(1)

          print(f"Total copied: {copied}")
          PY

          echo "Collected files:"
          find out -type f -print || true

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RUNA-3G3-SHUTTER-${{ matrix.target }}
          path: out/${{ matrix.target }}/*
