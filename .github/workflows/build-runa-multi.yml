name: Build RUNA Multi-Target INAV

on:
  workflow_dispatch:
  push:

jobs:
  list-targets:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            g++ \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-dev \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3 \
            python3-pip

      - name: Clone INAV
        run: |
          git clone --branch 7.1.2 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Configure CMake
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Show available F405/WING targets
        run: |
          cd inav/build
          echo "===== AVAILABLE TARGETS ====="
          make help | grep -i -E "F405|WING|SPEEDY|MATEK|JHE|CADDX|CADD" || true

  build:
    runs-on: ubuntu-22.04
    needs: list-targets

    strategy:
      fail-fast: false
      matrix:
        target:
          - SPEEDYBEEF405WING
          - JHEMCUF405WING
          - MATEKF405
          - MATEKF405TE
          - MATEKF405SE

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            git \
            build-essential \
            g++ \
            ruby \
            cmake \
            make \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-dev \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3 \
            python3-pip

      - name: Clone INAV
        run: |
          git clone --branch 7.1.2 --depth 1 https://github.com/iNavFlight/inav.git

      - name: Patch RUNA name in Configurator
        run: |
          cd inav
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("src/main/fc/fc_msp.c")
          text = path.read_text(encoding="utf-8")

          pattern = r'sbufWriteU8\(dst,\s*strlen\(targetName\)\);\s*sbufWriteData\(dst,\s*targetName,\s*strlen\(targetName\)\);'

          replacement = '''sbufWriteU8(dst, strlen(targetName) + 5);
                  sbufWriteData(dst, targetName, strlen(targetName));
                  sbufWriteData(dst, "+RUNA", 5);'''

          new_text, count = re.subn(pattern, replacement, text, count=1)

          if count != 1:
              print("ERROR: Could not patch MSP_BOARD_INFO targetName block")
              raise SystemExit(1)

          path.write_text(new_text, encoding="utf-8")
          print("Patched targetName -> targetName+RUNA in MSP_BOARD_INFO")
          PY

      - name: Patch RUNA OSD shutter
        run: |
          cd inav
          python3 <<'PY'
          from pathlib import Path

          path = Path("src/main/io/osd.c")
          text = path.read_text(encoding="utf-8")

          helper = r'''
          // RUNA CUSTOM OSD SHUTTER
          // Active only on OSD Layout 2.
          // It draws inverted spaces outside a small center window.
          // Center window remains clear so the pilot can see video through it.
          static void runaFillOsdSegment(uint8_t x, uint8_t y, uint8_t width, textAttributes_t attr)
          {
              if (width == 0) {
                  return;
              }

              char buffer[80];

              if (width >= sizeof(buffer)) {
                  width = sizeof(buffer) - 1;
              }

              memset(buffer, ' ', width);
              buffer[width] = '\0';

              displayWriteWithAttr(osdDisplayPort, x, y, buffer, attr);
          }

          static void osdDrawRunaShutter(void)
          {
              if (!osdDisplayPort) {
                  return;
              }

              const uint8_t cols = osdDisplayPort->cols;
              const uint8_t rows = osdDisplayPort->rows;

              if (cols < 8 || rows < 6) {
                  return;
              }

              // Small center window.
              // For analog MAX7456 30x16 this gives about 10x4 cells.
              const uint8_t windowWidth = cols >= 30 ? 10 : cols / 3;
              const uint8_t windowHeight = rows >= 16 ? 4 : rows / 3;

              const uint8_t windowX = (cols - windowWidth) / 2;
              const uint8_t windowY = (rows - windowHeight) / 2;

              textAttributes_t shutterAttr = TEXT_ATTRIBUTES_NONE;
              TEXT_ATTRIBUTES_ADD_INVERTED(shutterAttr);

              for (uint8_t y = 0; y < rows; y++) {
                  const bool inWindowY = (y >= windowY) && (y < windowY + windowHeight);

                  if (!inWindowY) {
                      runaFillOsdSegment(0, y, cols, shutterAttr);
                  } else {
                      runaFillOsdSegment(0, y, windowX, shutterAttr);
                      runaFillOsdSegment(windowX + windowWidth, y, cols - (windowX + windowWidth), shutterAttr);
                  }
              }
          }

          '''

          marker = "static void osdRefresh(timeUs_t currentTimeUs) {"
          if helper.strip() not in text:
              if marker not in text:
                  print("ERROR: osdRefresh marker not found")
                  raise SystemExit(1)
              text = text.replace(marker, helper + "\n" + marker, 1)

          old = '''osdDrawNextElement();
                  displayHeartbeat(osdDisplayPort);
                  displayCommitTransaction(osdDisplayPort);'''

          new = '''osdDrawNextElement();

                  if (currentLayout == 2) {
                      displayClearScreen(osdDisplayPort);
                      osdDrawRunaShutter();
                  }

                  displayHeartbeat(osdDisplayPort);
                  displayCommitTransaction(osdDisplayPort);'''

          if new not in text:
              if old not in text:
                  print("ERROR: OSD draw block not found")
                  raise SystemExit(1)
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          print("Patched RUNA OSD shutter: Layout 2 = shutter with center window")
          PY

      - name: Configure CMake
        run: |
          cd inav
          mkdir -p build
          cd build
          cmake ..

      - name: Check target exists
        run: |
          cd inav/build
          echo "Checking target: ${{ matrix.target }}"
          make help | grep -w "${{ matrix.target }}" || {
            echo "TARGET NOT FOUND: ${{ matrix.target }}"
            echo "Similar targets:"
            make help | grep -i -E "F405|WING|SPEEDY|MATEK|JHE|CADDX|CADD" || true
            exit 1
          }

      - name: Build target
        run: |
          cd inav/build
          make clean_${{ matrix.target }} || true
          make ${{ matrix.target }} -j2 VERBOSE=1

      - name: Find firmware
        if: always()
        run: |
          echo "===== BUILT FILES ====="
          find inav/build -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -print || true

      - name: Collect and rename firmware
        if: success()
        run: |
          mkdir -p out/${{ matrix.target }}

          python3 <<'PY'
          from pathlib import Path
          import shutil

          target = "${{ matrix.target }}"
          build_dir = Path("inav/build")
          out_dir = Path("out") / target
          out_dir.mkdir(parents=True, exist_ok=True)

          exts = {".hex", ".bin", ".elf"}
          copied = 0

          for file in build_dir.rglob("*"):
              if not file.is_file():
                  continue
              if file.suffix.lower() not in exts:
                  continue
              if target not in file.name:
                  continue

              new_name = f"RUNA_SHUTTER_{file.name}"
              dst = out_dir / new_name
              shutil.copy2(file, dst)
              print(f"Copied: {file} -> {dst}")
              copied += 1

          if copied == 0:
              print("ERROR: no firmware files found for target", target)
              raise SystemExit(1)

          print(f"Total copied: {copied}")
          PY

          echo "Collected files:"
          find out -type f -print || true

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RUNA-SHUTTER-${{ matrix.target }}
          path: out/${{ matrix.target }}/*
